<!DOCTYPE html>
<html>
<head>
    <title>Home</title>

    <style>

        body{
            font-family: Arial;
            margin:0;
            background:#f2f2f2;
        }

        header{
            background:#333;
            color:white;
            text-align:center;
            padding:15px;
        }

        .container{
            text-align:center;
            padding:40px;
        }

        .form-box{
            background:white;
            width:300px;
            margin:auto;
            padding:20px;
            box-shadow:0 0 5px gray;
        }

        input{
            width:90%;
            padding:8px;
            margin:8px;
        }

        button{
            background:#333;
            color:white;
            padding:10px;
            border:none;
            width:95%;
        }

    </style>

</head>

<body>

<header>
    <h1>Welcome to My Website</h1>
</header>

<div class="container">

    <h2>Student Form</h2>

    <div class="form-box">

        <form action="/student" method="post">

            <input type="text" name="name" placeholder="Enter Name" required>

            <input type="email" name="email" placeholder="Enter Email" required>

            <input type="number" name="age" placeholder="Enter Age">

            <button type="submit">Submit</button>

        </form>

    </div>

</div>

</body>
</html>
